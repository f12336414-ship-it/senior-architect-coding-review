name: Qodana example

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: JetBrains/qodana-action@4861e015da555e86a72b862892aba6c2b93e6891 # v2026.1.3
        with:
          pr-mode: false

# Copy into .github/workflows only after selecting the correct Qodana linter,
# token policy, baseline, and project-specific quality threshold.
